name: CI Scan

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "frontend/**"
      - "api-gateway/**"
      - "auth-service/**"
      - "collection-service/**"
      - "processing-service/**"
      - "ai-service/**"
      - "notification-service/**"
      - "shared-lib/**"
      - "requirements/**"
      - "package*.json"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  ci-scan:
    name: Reusable CI Scan
    uses: AzureFinOpsIQ/FinOpsIQ-Workflows/.github/workflows/app-ci-scan.yml@e17144ca34e4b22e9cb767b2a256a860744dcef0
    with:
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
