name: CI Build

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  ci-build:
    name: Reusable CI Build
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'build')
    uses: AzureFinOpsIQ/FinOPsIQ-Workflows/.github/workflows/app-ci-build.yml@63a531810cf233093c2dcd113c6d9d2f3ebd9562
    with:
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      helm_repository: ${{ vars.HELM_REPOSITORY || 'AzureFinOpsIQ/FinOpsIQ-Helm' }}
      github_environment: dev
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      helm_repo_token: ${{ secrets.HELM_REPO_TOKEN }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
