name: CI Scan

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - "frontend/**"
      - "api-gateway/**"
      - "auth-service/**"
      - "collection-service/**"
      - "processing-service/**"
      - "ai-service/**"
      - "notification-service/**"
      - "shared/**"
      - "src/**"
      - "requirements*.txt"
      - "package*.json"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  ci-scan:
    name: Reusable CI Scan
    uses: AzureFinOpsIQ/FinOpsIQ-Workflows/.github/workflows/app-ci-scan.yml@3a16038fb8b75f5569a0ec884c0598f9294890c7
    with:
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
      sonar_project_prefix: ${{ vars.SONAR_PROJECT_PREFIX }}
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
