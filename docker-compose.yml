services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: "http://auth-service:8000"
      COLLECTION_SERVICE_URL: "http://collection-service:8000"
      PROCESSING_SERVICE_URL: "http://processing-service:8000"
      AI_SERVICE_URL: "http://ai-service:8000"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8000"
      API_CORS_ORIGINS: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:3000"
      ENTRA_AUTHORITY: "https://login.microsoftonline.com/common"
      USE_MANAGED_IDENTITY: "false"
    depends_on:
      - auth-service
      - collection-service
      - processing-service
      - ai-service
      - notification-service
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - .env
    environment:
      COLLECTION_SERVICE_URL: "http://collection-service:8000"
      API_CORS_ORIGINS: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:3000"
      ENTRA_AUTHORITY: "https://login.microsoftonline.com/common"
      USE_MANAGED_IDENTITY: "false"
    restart: unless-stopped

  collection-service:
    build:
      context: .
      dockerfile: services/collection-service/Dockerfile
    env_file:
      - .env
    environment:
      PROCESSING_SERVICE_URL: "http://processing-service:8000"
      USE_MANAGED_IDENTITY: "false"
    restart: unless-stopped

  processing-service:
    build:
      context: .
      dockerfile: services/processing-service/Dockerfile
    env_file:
      - .env
    environment:
      USE_MANAGED_IDENTITY: "false"
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    env_file:
      - .env
    environment:
      USE_MANAGED_IDENTITY: "false"
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file:
      - .env
    environment:
      USE_MANAGED_IDENTITY: "false"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway
    restart: unless-stopped
