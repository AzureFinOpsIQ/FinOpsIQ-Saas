name: Release Promote

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  release-promote:
    name: Reusable Release Promote
    uses: AzureFinOpsIQ/FinOPsIQ-Workflows/.github/workflows/app-release-promote.yml@3a16038fb8b75f5569a0ec884c0598f9294890c7
    with:
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
